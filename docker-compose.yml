services:
  postgres:
    image: 'postgres:16-alpine'
    ports:
      - '${DB_PORT}:5432'
    environment:
      POSTGRES_DB: '${DB_DATABASE}'
      POSTGRES_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - 'db-data:/var/lib/postgresql/data'
    networks:
      - laravel-net

networks:
  laravel-net:
    driver: bridge

volumes:
  db-data:
    driver: local